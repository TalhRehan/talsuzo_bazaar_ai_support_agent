services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: talsuzo-bazaar-web
    ports:
      - "3000:3000"
    environment:
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-replace-with-a-long-random-secret}
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api
    depends_on:
      - api

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: talsuzo-bazaar-api
    ports:
      - "4000:4000"
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-local}
      APP_NAME: ${APP_NAME:-TalSuzo Bazaar API}
      FRONTEND_ORIGIN: http://localhost:3000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
