services:
  web:
    image: node:22-alpine
    container_name: talsuzo-bazaar-web
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - web_node_modules:/app/node_modules
    environment:
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api
    depends_on:
      - api

  api:
    image: python:3.12-slim
    container_name: talsuzo-bazaar-api
    working_dir: /app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 4000 --reload"
    ports:
      - "4000:4000"
    volumes:
      - ./apps/api:/app
    environment:
      ENVIRONMENT: local
      FRONTEND_ORIGIN: http://localhost:3000

volumes:
  web_node_modules:
